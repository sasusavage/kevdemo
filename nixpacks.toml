[phases.setup]
nixPkgs = ["python312Full", "postgresql_16", "gcc", "openssl", "libffi", "zlib"]

[phases.install]
cmds = ["python -m venv /opt/venv && /opt/venv/bin/pip install --upgrade pip && /opt/venv/bin/pip install -r requirements.txt"]

[start]
cmd = "/opt/venv/bin/gunicorn --chdir backend \"app:create_app()\" --bind 0.0.0.0:$PORT --workers 2"
